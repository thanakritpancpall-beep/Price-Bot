name: Daily Price Bot

on:
  schedule:
    - cron: '0 2 * * *' # รันเวลา 09:00 น. ของไทย (UTC 02:00) ทุกวัน
  workflow_dispatch: # ปุ่มสำหรับให้เรากดรันทดสอบได้เอง

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Tools
      run: |
        pip install gspread oauth2client requests beautifulsoup4

    - name: Run Python Script
      env:
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: python run_daily_price.py
